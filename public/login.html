<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #KENutzerdaten{
            display: none;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <div>
        <label for="username">Nutzername: </label>
        <input id="username"> <br>
        <label for="password">Passwort: </label>
        <input id="password" type="password"> <br>
        <button id="login" onclick="login()">login</button>
    </div>

    <div id="formKontoErstellen">
        <p id="labelKontoerstellen">Konto erstellen</p>
        <div id="KENutzerdaten" style="display: none;">
            <label>Benutzername: </label>
            <input id="KENutzername"> <br>
            <label>Passwort: </label>
            <input id="KEPasswort" type="password"> <br>
            <button onclick="kontoErstellen()">Konto erstellen</p>
        </div>
    </div>

    <script>
        async function login(){
            const nutzername = document.getElementById("username").value;
            const passwort = document.getElementById("password").value;

            console.log("Vor dem Fetch");

            const res = await fetch("/login", {
                method: "POST", 
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nutzername,
                    passwort
                })
            });

            console.log("Nach dem Fetch");

            const data = await res.json();

            if(data.success){
                console.log("Korrekter Benutzer");
                window.location.href = "/index.html";
            }
            else{
                alert(data.message);
            }
        }
        

        async function kontoErstellen(){
            const nutzername = document.getElementById("KENutzername").value;
            const passwort = document.getElementById("KEPasswort").value;
            


            const res = await fetch("/nutzerAnlegen", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nutzername: nutzername,
                    passwort: passwort
                })
            })

            let meldung = await res.json();
            alert(meldung.text);
        }

        
        document.getElementById("labelKontoerstellen").addEventListener("click", () => {
            let form = document.getElementById("KENutzerdaten");

            if(form.style.display === "none")
                form.style.display = "block";
            else    
                form.style.display = "none";
        })
        
    </script>
</body>
</html>
